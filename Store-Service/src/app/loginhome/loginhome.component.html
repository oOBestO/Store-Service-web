<div class="flex1 flex-col items-center justify-center min-h-screen bg-orange-500">
  <!-- Header -->
  <header class="header bg-black p-4 w-full fixed top-0 left-0 z-10"></header>
  
  <!-- ✅ Logo -->
  <img src="https://lh3.googleusercontent.com/d/1h8qLiCqY5WebsDwAxS9fHqifQgA-nxQM=w500"
    alt="Logo"
    class="w-40 h-40 mb-6 mt-16">

  <!-- Login Form -->
  <h1 class="text-gray-800 text-2xl font-bold mb-4">Login</h1>
  
  <!-- ✅ ปรับระยะห่างให้เหมาะสม -->
  <div class="flex1 flex-col items-center w-80 gap-15"> 
    <!-- Username -->
    <label class="text-gray-700 text-lg self-start mb-1">Username</label>
    <input type="text"
           [(ngModel)]="username"
           placeholder="Enter username"
           class="w-full p-2 rounded-md border border-gray-300 focus:border-black focus:outline-none">

    <!-- Password -->
    <label class="text-gray-700 text-lg self-start mb-1">Password</label>
    <input type="password"
           [(ngModel)]="password"
           placeholder="Enter password"
           class="w-full p-2 rounded-md border border-gray-300 focus:border-black focus:outline-none">

    <!-- ✅ เพิ่มระยะห่างจากช่อง Password -->
    <button (click)="login()"
            class="custom-login">
      Login
    </button>
  </div>
</div>
