<p-toast position="top-center"></p-toast>
<div class="back-button-wrapper">
  <p-button
    icon="pi pi-angle-double-left"
    class="p-1 w-7 h-7 text-sm back-btn"
    [style]="{'background-color': 'black', 'color': 'white', 'border': 'none'}"
    (click)="goBack()">
  </p-button>
</div>
<div class="info-container">
  <h2 class="title">กรอกข้อมูลผู้สั่ง</h2>

  <div class="form-group">
    <label for="name">ชื่อผู้สั่ง</label>
    <input id="name" type="text" [(ngModel)]="customerName" placeholder="Name" required />
  </div>

  <div class="form-group">
    <label for="phone">เบอร์โทรศัพท์</label>
    <input id="phone" type="tel" [(ngModel)]="customerPhone" placeholder="098xxxxxxx" required pattern="[0-9]{10}" />
  </div>

  <button class="btn confirm-btn" (click)="submitCustomerInfo()">ยืนยัน</button>
</div>
