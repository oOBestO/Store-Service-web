<div class="container">
  <!-- Header -->
  <!-- Title -->
  <h1 class="main-title">Restaurant Custom</h1>
  <h2 class="subtitle">ข้าวสวย</h2>

  <!-- Form -->
  <div class="form-container">
    <label for="menu-name">ชื่อรายการ</label>
    <input type="text" id="menu-name" [(ngModel)]="newItem" class="input-box" placeholder="เพิ่มชื่อเมนู">

    <!-- ปุ่มเพิ่มรายการ & ลบหมวดหมู่ -->
    <div class="button-group">
      <button (click)="addItem()" class="btn add-btn">เพิ่มรายการ</button>
    </div>

    <!-- รายการเมนู -->
  <!-- แสดงรายการเมนูที่บันทึก -->
  <div class="menu-list">
    <div class="card" *ngFor="let menu of menuItems">
      <img [src]="menu.imageUrl" class="card-image" alt="รูปเมนู">
      <div class="card-body">
        <h3>{{ menu.menuName }}</h3>
        <p class="price">฿{{ menu.price }}</p>
        <div class="card-buttons">
          <button (click)="editMenu(menu)" class="btn edit-btn">แก้ไข</button>
          <button (click)="deleteMenu(menu.id)" class="btn delete-btn">ลบ</button>
        </div>
      </div>
    </div>
  </div>


  <!-- ปุ่มยืนยัน -->
  <button (click)="confirm()" class="btn confirm-btn">ยืนยัน</button>
</div>
