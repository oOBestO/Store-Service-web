<section class="content1">
  <div class="heading">
    <p-button
  class="download-btn"
  [routerLink]="['/admin/qr']"
  [style]="{ 'background-color': 'white', 'border': 'none' }"
>
  <i class="pi pi-download download-icon" [style]="{ 'color': 'black' }"></i>
</p-button>
    <h1>Restaurant</h1>
  </div>

  <div class="sub-title">ข้าวสวย</div>

  <!-- กลุ่มโต๊ะตามจำนวนที่นั่ง -->
  <div *ngFor="let seatGroup of seatGroups" class="seat-group">
    <h3>{{ seatGroup.seats }} ที่นั่ง</h3>

    <div class="table-list">
      <p-card *ngFor="let table of seatGroup.tables" class="table-card">
        <ng-template pTemplate="content">
          <div class="table-content" style="display: flex; align-items: center; gap: 1rem;">
            <!-- รูปโต๊ะด้านซ้าย -->
            <div class="table-icon">
              <img
                *ngIf="table.image"
                [src]="table.image"
                (error)="table.image = 'assets/images/table/default.png'"
                alt="โต๊ะที่ {{ table.index }}"
                style="width: 80px; height: auto; border: 1px solid black;"
              />
            </div>
          
            <!-- ข้อมูลโต๊ะด้านขวา: จัดเป็นคอลัมน์ -->
            <div class="table-info" style="display: flex; flex-direction: column; justify-content: center;">
              <h4 style="margin: 0 0 0.5rem 0;">โต๊ะที่ : {{ table.index }}</h4>
              <p-button
                class="delete-btn"
                (click)="deleteTable(table.id)"
                [style]="{ 'background-color': 'black', 'border': 'none' }"
              > ลบ</p-button>
            </div>
          </div>                  
        </ng-template>
      </p-card>
    </div>
  </div>
</section>
