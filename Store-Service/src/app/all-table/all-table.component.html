<header class="header">
  <i class="pi pi-angle-double-left icon-left"></i>
  <img src="logo.png" alt="Logo" class="logo">
</header>

<section class="content">
  <div class="heading">
    <h1>Restaurant</h1>
    <h2>ข้าวสวย</h2>
  </div>

  <!-- กลุ่มโต๊ะตามจำนวนที่นั่ง -->
  <div *ngFor="let seatGroup of seatGroups" class="seat-group">
    <h3>{{ seatGroup.seats }} ที่นั่ง</h3>
  
    <div class="table-list">
      <p-card *ngFor="let table of seatGroup.tables" class="table-card">
        <ng-template pTemplate="content">
          <div class="table-content">
            <!-- ✅ แสดงรูปจาก Base64 -->
            <div class="table-icon">
              <img *ngIf="table.image" [src]="table.image" alt="โต๊ะที่ {{ table.index }}" />
              <span *ngIf="!table.image">ไม่มีรูป</span>
            </div>
  
            <!-- ✅ ข้อมูลโต๊ะ -->
            <div class="table-info">
              <h4>โต๊ะที่ : {{ table.index }}</h4>
              <p-button class="delete-btn" (click)="deleteTable(table.id)">ลบ</p-button>

            </div>
            
            <!-- ✅ ดาวน์โหลดรูป -->
            <i class="pi pi-download download-icon"></i>
          </div>
        </ng-template>
      </p-card>
    </div>       
  </div>
  
</section>
