<div class="payment-page">
  <p-toast></p-toast>

  <p-steps
    [model]="items"
    [readonly]="true"
    [activeIndex]="activeIndex"
    class="steps-custom"
  ></p-steps>

  <div class="payment-card">
    <h2>โต๊ะ {{ tableNumber }}</h2>
    <h3>ยอดชำระ: <span class="cost">{{ totalCost }} ฿</span></h3>

    <div class="payment-methods">
      <label class="radio-option">
        <input type="radio" name="payment" [(ngModel)]="selectedPayment" value="cash" />
        ชำระเงินสด
      </label>

      <label class="radio-option">
        <input type="radio" name="payment" [(ngModel)]="selectedPayment" value="qr" />
        ชำระผ่าน QR Code
      </label>
    </div>

    <!-- ✅ แสดง QR เมื่อเลือก -->
    <div *ngIf="selectedPayment === 'qr'" class="qr-section">
      <img [src]="qrCodeUrl" alt="QR Code" class="qr-code" />
      <p class="qr-note">กรุณาสแกนเพื่อชำระเงิน</p>
    </div>

    <!-- ✅ ปุ่มยืนยันถูก disable ขณะกำลังยืนยัน -->
    <button
      class="btn-confirm"
      [disabled]="isConfirming || !selectedPayment"
      (click)="confirmPayment()"
    >
      {{ isConfirming ? 'กำลังตรวจสอบ...' : 'ยืนยันชำระเงิน' }}
    </button>
  </div>

  <!-- ✅ Modal รอการชำระเงิน -->
  <div *ngIf="showWaitingModal" class="modal-overlay">
    <div class="modal-content">
      <p>กรุณารอพนักงานยืนยันการชำระเงิน...</p>
      <p><i class="pi pi-spinner pi-spin" style="font-size: 2em;"></i></p>
    </div>
  </div>
</div>
