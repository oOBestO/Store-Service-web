<div class="container">
  <h1 class="main-title">Restaurant</h1>
  <h2 class="subtitle">ข้าวสวย</h2>

  <!-- ✅ เมนูแนะนำ -->
  <div class="recommended-section">
    <h3 class="category-title" style="color: black;">เมนูเลือกให้</h3>
    <div class="menu-list">
      <div *ngFor="let menu of randomMenus"
          class="menu-card"
          [class.selected]="selectedMenus.includes(menu.id)"
          (click)="toggleSelection(menu)">

        <div class="overlay" *ngIf="selectedMenus.includes(menu.id)">
          <span>เลือกแล้ว</span>
        </div>

        <img [src]="menu.imageUrl" class="menu-image">
        <div class="menu-info">
          <h4>{{ menu.menuName }}</h4>
          <p>ราคา {{ menu.price }} ฿</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ หมวดหมู่เมนู -->
  <div *ngFor="let category of categoryKeys">
    <h3 class="category-title">{{ category }}</h3>
    <div class="menu-list">
      <div *ngFor="let menu of groupedMenus[category]"
          class="menu-card"
          [class.selected]="selectedMenus.includes(menu.id)"
          (click)="toggleSelection(menu)">

        <div class="overlay" *ngIf="selectedMenus.includes(menu.id)">
          <span>เลือกแล้ว</span>
        </div>

        <img [src]="menu.imageUrl" class="menu-image">
        <div class="menu-info">
          <h4>{{ menu.menuName }}</h4>
          <p>ราคา {{ menu.price }} ฿</p>
        </div>
      </div>
    </div>
  </div>

  <button (click)="confirmSelection()" class="btn confirm-btn">ยืนยัน</button>
</div>
